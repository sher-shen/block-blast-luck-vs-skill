<text x="64" y="512" font-size="11" fill="#444">正向 DDA（诚实结论）：发牌难度旋钮 β 把 strong 生存率从 0.21 拉到 0.99（强、单调）—但 EVPI 占比几乎平（~65–75%，CI 互叠）⇒ **难度与运气含量解耦**。</text>
<text x="64" y="528" font-size="11" fill="#444">⇒ 运气含量不由"块多大/多难"决定，而由计分结构(A&#39;: 乘法连击 65%→86%)与是否含极端坏块(no9: 65%→77%)决定。静态重加权=善意下界；固定 T 保 EVPI 良定义。</text>
