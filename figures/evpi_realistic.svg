<text x="56" y="550" font-size="11" fill="#444">结论：57–69%(原 assumed·uniform)是 benchmark 压低的**保守下界**；越贴近真实游戏(乘法连击计分 + 善意发牌)，运气占比越逼近 ~100% ⇒ 天花板处技能通道被吃满的结论更强。</text>
